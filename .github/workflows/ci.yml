  #       run: |
  #         {
  #           echo "// CI placeholder - online features disabled"
  #           echo "LASTFM_API_KEY = "
  #           echo "LASTFM_SHARED_SECRET = "
  #         } > Configuration/Secrets.xcconfig
  #
