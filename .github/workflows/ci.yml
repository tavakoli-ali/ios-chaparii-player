  #       run: |
  #         xcodebuild -resolvePackageDependencies \
  #           -project "$PROJECT" \
  #           -scheme "$SCHEME" \
  #           -clonedSourcePackagesDirPath .spm
  #
  #     # Universal (both archs) to mirror what actually ships; ad-hoc signed.
  #     - name: Build (Release)
  #       run: |
  #         set -o pipefail
  #         xcodebuild build \
  #           -project "$PROJECT" \
  #           -scheme "$SCHEME" \
  #           -configuration Release \
  #           -destination 'platform=macOS' \
  #           -clonedSourcePackagesDirPath .spm \
  #           -derivedDataPath ~/Library/Developer/Xcode/DerivedData \
  #           ONLY_ACTIVE_ARCH=NO \
  #           CODE_SIGN_IDENTITY="-" \
  #           CODE_SIGNING_REQUIRED=NO \
  #           CODE_SIGNING_ALLOWED=NO \
  #           | xcbeautify --renderer github-actions

  # Single required status for branch protection. release-build is intentionally
  # excluded (it only runs on push to main/tags, never on PRs).
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [lint, actionlint, build-analyze, build-analyze-ios]
    if: always()
    steps:
      - name: Verify required jobs
        run: |
          echo "lint=${{ needs.lint.result }}"
          echo "actionlint=${{ needs.actionlint.result }}"
          echo "build-analyze=${{ needs.build-analyze.result }}"
          echo "build-analyze-ios=${{ needs.build-analyze-ios.result }}"
          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.actionlint.result }}" != "success" ] || \
             [ "${{ needs.build-analyze.result }}" != "success" ] || \
             [ "${{ needs.build-analyze-ios.result }}" != "success" ]; then
            echo "::error::One or more required checks failed"
            exit 1
          fi
          echo "All required checks passed ✅"
