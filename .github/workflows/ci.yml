  #       uses: actions/cache@v5
  #       with:
  #         path: ~/Library/Developer/Xcode/DerivedData
  #         key: ${{ runner.os }}-dd-release-${{ hashFiles('**/*.swift', '**/Package.resolved') }}
  #         restore-keys: |
  #           ${{ runner.os }}-dd-release-
